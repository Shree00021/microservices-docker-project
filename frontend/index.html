<!DOCTYPE html>
<html>
<head>
    <title>Microservices App</title>
</head>
<body>

<h1>Microservices Project</h1>

<button onclick="getUsers()">Get Users</button>
<button onclick="getTasks()">Get Tasks</button>

<pre id="output"></pre>

<script>
function getUsers() {
    fetch('http://localhost:5001/get')
    .then(res => res.json())
    .then(data => {
        document.getElementById("output").innerText = JSON.stringify(data, null, 2);
    })
    .catch(err => console.log(err));
}

function getTasks() {
    fetch('http://localhost:5002/get')
    .then(res => res.json())
    .then(data => {
        document.getElementById("output").innerText = JSON.stringify(data, null, 2);
    })
    .catch(err => console.log(err));
}
</script>

</body>
</html>
